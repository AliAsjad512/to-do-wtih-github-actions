name: Hello CodeFlow

on:
  push:
    branches:
      - main
    schedule:
      - cron: '0 */4 * * *'
permissions:
  contents: write  

jobs:
  greet:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://test-db:5432/codeflow_test
    steps:
      - uses: actions/checkout@v4

      - name: build
        run: yarn install

      - name: test
        env:
          SQLITE_DB_LOCATION: /tmp/todos/todo.db
        run: yarn test

      - name: Show current date
        run: date

      - name: Log run date to file
        run: |
          mkdir -p logs
          echo "Workflow ran at: $(date -u)" >> logs/run-log.txt

      - name: Commit and push log file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/run-log.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Log run: $(date -u)"
          git push
